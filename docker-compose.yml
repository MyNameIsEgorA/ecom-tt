services:
  json-server:
    image: node:20-alpine
    container_name: tt-json-server
    working_dir: /app
    command: sh -c "npm install -g json-server@0.17.4 && json-server --watch db.json --host 0.0.0.0 --port 3000"
    volumes:
      - ./db.json:/app/db.json:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tt-frontend
    ports:
      - "4173:80"
    depends_on:
      - json-server
    restart: unless-stopped
